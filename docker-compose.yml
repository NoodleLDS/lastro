services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - lastro-db:/app/db
    environment:
      LASTRO_DATABASE_URL: sqlite+aiosqlite:///./db/lastro.db
      LASTRO_OLLAMA_URL: http://ollama:11434
    depends_on:
      - ollama
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn lastro.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve &
             sleep 3 &&
             ollama pull llama3.2:3b &&
             wait"

volumes:
  lastro-db:
  ollama-data:
