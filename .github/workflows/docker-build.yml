name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "**/Dockerfile"
  schedule:
    - cron: "0 6 * * 1"  # mondays 06:00 UTC

jobs:
  build:
    name: docker compose build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build --no-cache
